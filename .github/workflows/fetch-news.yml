name: Fetch News Daily

on:
  schedule:
    - cron: '30 1 * * *'  # UTC 01:30（北京时间 09:30）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/news.json
          git diff --cached --quiet || git commit -m "chore: auto-update news $(date -u +%Y-%m-%d)"
          git push
