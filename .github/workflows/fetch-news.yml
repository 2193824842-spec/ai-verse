name: Fetch News Daily

on:
  schedule:
    - cron: '19 10 20 4 *'  # 临时测试：UTC 10:19 Apr 20
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json
          git diff --cached --quiet || git commit -m "chore: auto-update news $(date -u +%Y-%m-%d)"
          git push
